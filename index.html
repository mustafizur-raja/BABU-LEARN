<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Babu Learn - 3D Kids App</title>
    <style>
        /* CSS: 3D Design & Animations */
        :root {
            --primary: #6c5ce7;
            --bg: #f0f2f5;
            --glass: rgba(255, 255, 255, 0.4);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 3D Glass Card */
        .glass-container {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 40px;
            padding: 20px;
            width: 90%;
            max-width: 400px;
            margin-top: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            text-align: center;
        }

        .score-bar {
            display: flex;
            justify-content: space-between;
            width: 80%;
            font-weight: bold;
            color: #2d3436;
            margin-top: 15px;
        }

        /* 3D Buttons */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
        }

        .babu-btn {
            background: #fff;
            border: none;
            padding: 25px;
            border-radius: 30px;
            font-size: 24px;
            font-weight: bold;
            color: var(--primary);
            box-shadow: 0 10px 0px #d1d8e0; /* 3D Depth */
            transition: 0.1s;
            cursor: pointer;
        }

        .babu-btn:active {
            transform: translateY(10px);
            box-shadow: 0 0px 0px #d1d8e0;
        }

        /* Language Theme Colors */
        .bn { border-bottom: 5px solid #ff7675; }
        .en { border-bottom: 5px solid #74b9ff; }
        .hi { border-bottom: 5px solid #55efc4; }
        .ar { border-bottom: 5px solid #ffe11a; }

        .letter-display {
            font-size: 80px;
            margin: 40px 0;
            text-shadow: 2px 5px 10px rgba(0,0,0,0.1);
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="score-bar">
        <span>⭐ Score: <span id="score">0</span></span>
        <span>🆙 Level: <span id="level">1</span></span>
    </div>

    <div id="lang-screen" class="glass-container">
        <h2>Cholo Sikhi! 👋</h2>
        <p>Bhasha Select Koro:</p>
        <div class="grid">
            <button class="babu-btn bn" onclick="startApp('bn')">অ (BN)</button>
            <button class="babu-btn en" onclick="startApp('en')">A (EN)</button>
            <button class="babu-btn hi" onclick="startApp('hi')">अ (HI)</button>
            <button class="babu-btn ar" onclick="startApp('ar')">ا (AR)</button>
        </div>
    </div>

    <div id="learn-screen" class="glass-container hidden">
        <h3 id="mode-text">Letters</h3>
        <div class="letter-display" id="main-letter">অ</div>
        <button class="babu-btn" onclick="nextLetter()">Next Letter ▶</button>
        <br><br>
        <button onclick="goBack()" style="background:none; border:none; color:#636e72;">← Back</button>
    </div>

    <script>
        // JS Logic
        let currentLang = 'bn';
        let score = 0;
        let level = 1;

        const data = {
            bn: ["অ", "আ", "ই", "ঈ", "উ", "ঊ"],
            en: ["A", "B", "C", "D", "E", "F"],
            hi: ["अ", "आ", "इ", "ई", "उ", "ऊ"],
            ar: ["ا", "ب", "ت", "ث", "ج", "ح"]
        };

        let index = 0;

        function startApp(lang) {
            currentLang = lang;
            document.getElementById('lang-screen').classList.add('hidden');
            document.getElementById('learn-screen').classList.remove('hidden');
            updateDisplay();
            playEffect();
        }

        function updateDisplay() {
            document.getElementById('main-letter').innerText = data[currentLang][index];
        }

        function nextLetter() {
            index++;
            if(index >= data[currentLang].length) {
                index = 0;
                levelUp();
            }
            score += 10;
            document.getElementById('score').innerText = score;
            updateDisplay();
            playEffect();
        }

        function levelUp() {
            level++;
            document.getElementById('level').innerText = level;
            alert("Super Babu! Level Up! 🎉");
        }

        function playEffect() {
            if(navigator.vibrate) navigator.vibrate(50);
            // Audio play code ekhane hobe
        }

        function goBack() {
            document.getElementById('lang-screen').classList.remove('hidden');
            document.getElementById('learn-screen').classList.add('hidden');
        }
    </script>
</body>
</html>
